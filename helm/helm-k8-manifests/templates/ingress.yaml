apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spring-app-ingress
spec:
  ingressClassName: traefik
  rules:
  - host: "spring-app.local"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: spring-app-service
            port:
              number: 80